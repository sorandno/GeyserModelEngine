main: re.imc.geysermodelengine.GeyserModelEngine
name: GeyserModelEngine
version: '${version}'
api-version: '1.21'

authors:
  - zimzaza4
  - willem.dev
  - xSquishyLiam

load: STARTUP

# load: BEFORE = 依存プラグインが本プラグインより先にロードされる。
# デフォルトの OMIT は順序未定義のため、起動時に API を使う依存には BEFORE を明示する。
dependencies:
  server:
    GeyserUtils:
      load: BEFORE
      required: true
    packetevents:
      load: BEFORE
      required: true
    floodgate:
      load: BEFORE
      required: false
    ModelEngine:
      load: BEFORE
      required: false
    BetterModel:
      load: BEFORE
      required: false